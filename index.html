<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Supply Co. | Coming Soon</title>
    
    <!-- Fonts: Inter for headings, Space Mono for technical data -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js for 3D interaction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        #content-overlay {
            position: relative;
            z-index: 10;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glow-button {
            transition: all 0.3s ease;
            background-size: 200% auto;
        }

        .glow-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(236, 72, 153, 0.8);
            background-position: right center;
        }
        
        .text-gradient {
            background: linear-gradient(to right, #38bdf8, #ec4899, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="antialiased selection:bg-pink-500 selection:text-white">

    <!-- 3D Canvas Background -->
    <div id="canvas-container"></div>

    <!-- Main Content -->
    <main id="content-overlay" class="min-h-screen flex flex-col justify-between p-6 md:p-12 pointer-events-none">
        
        <!-- Header -->
        <header class="flex justify-between items-center w-full">
            <div class="font-black text-xl tracking-tighter">
                FSC.
            </div>
            <div class="text-xs md:text-sm text-gray-300 font-bold bg-white/10 px-4 py-1.5 rounded-full backdrop-blur-md border border-white/10 shadow-xl">
                📍 Chicago, IL
            </div>
        </header>

        <!-- Center Content -->
        <div class="flex flex-col items-center text-center max-w-4xl mx-auto pointer-events-auto w-full">
            
            <div class="inline-flex items-center space-x-2 glass-panel rounded-full px-5 py-2 mb-8 shadow-2xl border border-pink-500/30">
                <span class="text-xl">🔥</span>
                <span class="text-xs md:text-sm font-bold tracking-widest text-gray-200 uppercase">Dropping Fall</span>
            </div>

            <h1 class="text-5xl md:text-7xl lg:text-8xl font-black tracking-tighter mb-6 leading-none">
                Custom Gear For <br/> 
                <span class="text-gradient">Greek Life & Events.</span>
            </h1>
            
            <p class="text-gray-300 text-lg md:text-xl max-w-2xl mx-auto mb-10 font-medium leading-relaxed">
            Custom tokens, multi-color bottle openers, and rush merch. 3D printed fast in Chicago. Zero manual painting. Zero setup fees.
        </p>

        <a href="mailto:jacob@functionsupplyco.com" class="glow-button pointer-events-auto inline-flex items-center justify-center px-10 py-5 text-sm md:text-base font-black text-white bg-gradient-to-r from-sky-400 via-pink-500 to-amber-400 rounded-full uppercase tracking-widest transition-all shadow-xl">
            Pre-Book Your Order
        </a>
    </div>

    <!-- Footer -->
    <footer class="w-full flex flex-col md:flex-row justify-between items-center text-xs text-gray-500 font-bold tracking-widest uppercase">
        <div class="glass-panel px-5 py-2 rounded-full mb-4 md:mb-0 border border-white/5">
            High-Speed Multi-Color Printing
        </div>
        <div>
            &copy; <span id="year"></span> Function Supply Co.
        </div>
    </footer>
</main>

<script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // --- Three.js Setup ---
        let scene, camera, renderer, objects = [];
        let mouseX = 0;
        let mouseY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 150;

            // Lighting to make the "plastic" material pop
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            scene.add(dirLight);

            const backLight = new THREE.DirectionalLight(0xec4899, 0.6); // Pink rim light
            backLight.position.set(-50, -100, -50);
            scene.add(backLight);

            // Material settings (mimicking glossy Bambu filament)
            const plasticMaterialParams = {
                roughness: 0.15,
                metalness: 0.1,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1
            };

            // Geometries representing our products
            const geometries = [
                new THREE.CylinderGeometry(12, 12, 2.5, 32), // Tokens/Coins
                new THREE.TorusGeometry(10, 3.5, 16, 100),   // Bottle Opener Rings
                new THREE.IcosahedronGeometry(12)            // Modern Geometric accents
            ];

            // Tailwind brand colors: Sky Blue, Hot Pink, Amber Yellow
            const colors = [0x38bdf8, 0xec4899, 0xfbbf24]; 

            // Create floating objects
            for (let i = 0; i < 25; i++) {
                const geo = geometries[Math.floor(Math.random() * geometries.length)];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                const material = new THREE.MeshPhysicalMaterial({
                    color: color,
                    ...plasticMaterialParams
                });

                const mesh = new THREE.Mesh(geo, material);
                
                // Random positioning across the screen
                mesh.position.x = (Math.random() - 0.5) * 350;
                mesh.position.y = (Math.random() - 0.5) * 350;
                mesh.position.z = (Math.random() - 0.5) * 200 - 50;

                // Random initial rotation
                mesh.rotation.x = Math.random() * Math.PI;
                mesh.rotation.y = Math.random() * Math.PI;

                // Storing randomized speed data for the animation loop
                mesh.userData = {
                    rotSpeedX: (Math.random() - 0.5) * 0.02,
                    rotSpeedY: (Math.random() - 0.5) * 0.02,
                    floatSpeed: (Math.random() * 0.05) + 0.02,
                    startY: mesh.position.y,
                    floatOffset: Math.random() * Math.PI * 2
                };

                objects.push(mesh);
                scene.add(mesh);
            }

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0); // Keep background transparent so CSS shows
            container.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onDocumentMouseMove, false);
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('touchmove', onDocumentTouchMove, { passive: false });

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onDocumentMouseMove(event) {
            mouseX = (event.clientX - windowHalfX) * 0.05;
            mouseY = (event.clientY - windowHalfY) * 0.05;
        }
        
        function onDocumentTouchMove(event) {
            if (event.touches.length == 1) {
                mouseX = (event.touches[0].pageX - windowHalfX) * 0.05;
                mouseY = (event.touches[0].pageY - windowHalfY) * 0.05;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function render() {
            const time = Date.now() * 0.001;

            // Parallax camera effect based on mouse movement
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            // Animate floating objects
            objects.forEach((obj) => {
                obj.rotation.x += obj.userData.rotSpeedX;
                obj.rotation.y += obj.userData.rotSpeedY;
                
                // Gentle floating bobbing effect
                obj.position.y = obj.userData.startY + Math.sin(time * 2 + obj.userData.floatOffset) * 15;
            });

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
